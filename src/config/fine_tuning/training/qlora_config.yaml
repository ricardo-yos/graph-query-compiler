# ==============================================
# Model Configuration
# ==============================================
base_model: mistralai/Mistral-7B-Instruct-v0.2
tokenizer_type: mistralai/Mistral-7B-Instruct-v0.2

sequence_len: 512
stop_token: "</json>"

# ==============================================
# Dataset
# ==============================================
dataset:
  name: local_jsonl
  cache_dir: data/datasets/cache

  data_files:
    train: data/datasets/splits/train_base.jsonl
    validation: data/datasets/splits/val_base.jsonl

  type: completion
  seed: 42

# ==============================================
# Prompt Instruction
# ==============================================
task_instruction: >
  Given a natural language question, predict the user's query regime and return a JSON query schema.
  The JSON structure MUST be exactly as specified.
  Include both "regime" and "schema" in the output.
  Return ONLY valid JSON. Do not explain.

# ==============================================
# Quantization (QLoRA)
# ==============================================
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: float16

# ==============================================
# LoRA Configuration
# ==============================================
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_bias: none

target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ==============================================
# Training Configuration
# ==============================================
num_epochs: 4

learning_rate: 3e-5

batch_size: 1
gradient_accumulation_steps: 16
eval_batch_size: 1

lr_scheduler: cosine
warmup_ratio: 0.05

fp16: true
bf16: false

logging_steps: 10
eval_steps: 50
save_steps: 100
save_total_limit: 2

optim: paged_adamw_8bit
max_steps: -1

# ==============================================
# Output
# ==============================================
output_dir: models/qlora-intent-model
