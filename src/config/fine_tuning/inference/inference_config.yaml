# ==============================================
# Model
# ==============================================

base_model: mistralai/Mistral-7B-Instruct-v0.2
adapter_dir: models/qlora-intent-model

max_new_tokens: 256

stop_token: "</json>"
answer_marker: "### Answer:\n"

# ==============================================
# Prompt
# ==============================================

task_instruction: >
  Given a natural language question, predict the user's intent and return a JSON query schema.

  Guidelines:
  - Use only attributes defined in the schema.
  - Apply filters when the question specifies constraints.
  - Use relationships (path) only when the question refers to entities inside or related to other entities.
  - Use aggregation only when the question requires combining multiple entities (e.g. count, average, min, max).

  Return ONLY valid JSON containing:
  "user_intent" and "schema".

# ==============================================
# Quantization
# ==============================================

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: float16
